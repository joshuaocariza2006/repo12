<style>
    body { font-family: 'Poppins'; background: #020617; color: white; margin: 0; }
    header { padding: 20px 10%; display: flex; align-items: center; gap: 20px; }
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px; padding: 0 10%; }
    
    .card {
        background: #1e293b;
        padding: 30px;
        border-radius: 20px;
        border-left: 5px solid #38bdf8;
        cursor: pointer;
        transition: all 0.3s ease;
    }
    .card:hover {
        background: #334155;
        transform: scale(1.03) translateY(-5px);
        box-shadow: 0 10px 30px rgba(0,0,0,0.3);
    }
    .card.science { border-left-color: #4ade80; }
    
    #content {
        margin: 40px 10%;
        padding: 30px;
        background: rgba(56, 189, 248, 0.05);
        border-radius: 20px;
        display: none; /* Hidden until clicked */
        animation: fadeIn 0.5s ease;
    }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    
    .action-btn {
        padding: 12px 24px; border: none; border-radius: 10px;
        margin-right: 10px; cursor: pointer; font-weight: 600;
    }
    .dl { background: #38bdf8; color: #020617; }
    .qz { background: transparent; border: 1px solid #38bdf8; color: #38bdf8; }
</style>

<header>
    <a href="index.html" style="color:#38bdf8; text-decoration:none">← Home</a>
    <h2>Worksheets</h2>
</header>

<div class="grid">
    <div class="card" onclick="openTopic('Algebra', '#38bdf8')">📐 Math: Algebra</div>
    <div class="card science" onclick="openTopic('Biology', '#4ade80')">🧬 Science: Biology</div>
</div>

<div id="content"></div>

<script>
    function openTopic(name, color) {
        const content = document.getElementById('content');
        content.style.display = 'block';
        content.style.borderLeft = `5px solid ${color}`;
        content.innerHTML = `
            <h2 style="color:${color}">${name} Resource Pack</h2>
            <p>Includes: Practice Problems, Answer Keys, and Video Explanations.</p>
            <button class="action-btn dl" onclick="alert('Downloading...')">Download PDF</button>
            <button class="action-btn qz" onclick="alert('Opening Quiz...')">Start Interactive Quiz</button>
        `;
    }
</script>
